# This is my hello workflow file for GitHub Actions. It will run on every push to the repository and perform a series of steps to greet the user, show the current date and time, display the current branch name, list the files in the repository, and show the operating system of the runner.
name: Hello GitHub Actions

on:
  push:

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Greeting
        run: echo "Hello from GitHub Actions!"

      - name: Show Date and Time
        run: date

      - name: Show Current Branch
        run: echo "Branch: ${{ github.ref_name }}"

      - name: List Repository Files
        run: ls -la

      - name: Display Runner OS
        run: echo "Runner OS: $RUNNER_OS"
