services:

  web:
    build: ./app

    container_name: flask-app

    ports:
      - "5000:5000"

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - app-network

  postgres:

    image: postgres:16

    container_name: postgres-db

    restart: always

    environment:
      POSTGRES_DB: flaskdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL","pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - app-network

networks:

  app-network:

volumes:

  postgres-data:
